apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-feature-store
  namespace: ml-platform
  labels:
    app: ml-feature-store
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ml-feature-store
  template:
    metadata:
      labels:
        app: ml-feature-store
        version: v1.0.0
    spec:
      containers:
      - name: feature-store
        image: ml-feature-store:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: REDIS_HOST
          value: "redis-service"
        - name: KAFKA_BROKERS
          value: "kafka-service:9092"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ml-feature-store-service
  namespace: ml-platform
spec:
  selector:
    app: ml-feature-store
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP