apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: feature-store-metrics
  namespace: default
  labels:
    app: feature-store
spec:
  selector:
    matchLabels:
      app: feature-store
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - default